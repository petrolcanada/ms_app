<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#04060C" />
    <script>
      (function () {
        try {
          var key = 'fundlens_theme_mode';
          var stored = localStorage.getItem(key);
          var mode = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', mode);
          document.documentElement.style.colorScheme = mode;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content', mode === 'light' ? '#F5F1E8' : '#04060C');
          }
        } catch (error) {
          /* ignore */
        }
      })();
    </script>
    <meta name="description" content="FundLens — Precision Glass fund analytics dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
    <title>FundLens</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
